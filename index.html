
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thingyan Surprise for You</title>
    <style>
        :root {
            --pink: #ff7eb3;
            --yellow: #ffedbc;
            --gold: #d4a017;
            --shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, var(--yellow) 0%, var(--pink) 100%);
            font-family: 'Segoe UI', 'Pyidaungsu', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Profile Image Section */
        .profile-container {
            margin-top: 20px;
            position: relative;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }
        .profile-img:hover { transform: scale(1.05); }

        /* Title & Timer */
        h1 {
            color: #5d4037;
            margin: 20px 0 10px;
            text-shadow: 1px 1px 2px white;
        }
        #timer {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: var(--shadow);
        }
        .unit { text-align: center; min-width: 60px; }
        .unit span { display: block; font-size: 1.5rem; font-weight: bold; color: #ff4d6d; }
        .label { font-size: 0.7rem; color: #555; text-transform: uppercase; }

        /* Flower Grid (2x4) */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin-bottom: 100px; /* Space for float buttons */
        }
        .grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.3s;
        }
        .grid img:active { transform: scale(0.95); }

        /* Floating Buttons */
        .float-btn {
            position: fixed;
            bottom: 30px;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }
        .btn-water { left: 30px; background: #4facfe; }
        .btn-music { right: 30px; background: #ff4d6d; }
        .float-btn:active { transform: translateY(5px); }

        /* Message Box */
        #msgBox {
            position: fixed;
            top: -100%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 200;
            text-align: center;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #msgBox.show { top: 50%; }
        .close-btn {
            margin-top: 20px;
            background: #ff7eb3;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Water/Flower Animation Effect */
        .drop {
            position: fixed;
            top: -50px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 99;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="img1.jpg" alt="Crush" class="profile-img" onclick="showMessage()">
    </div>

    <h1>Thingyan Countdown</h1>

    <div id="timer">
        <div class="unit"><span id="days">00</span><div class="label">Days</div></div>
        <div class="unit"><span id="hours">00</span><div class="label">Hours</div></div>
        <div class="unit"><span id="mins">00</span><div class="label">Mins</div></div>
        <div class="unit"><span id="secs">00</span><div class="label">Secs</div></div>
    </div>

    <div class="grid">
        <img src="img2.jpg" onclick="showMessage()">
        <img src="img3.jpg" onclick="showMessage()">
        <img src="img4.jpg" onclick="showMessage()">
        <img src="img5.jpg" onclick="showMessage()">
        <img src="img6.jpg" onclick="showMessage()">
        <img src="img7.jpg" onclick="showMessage()">
        <img src="img8.jpg" onclick="showMessage()">
        <img src="img9.jpg" onclick="showMessage()">
    </div>

    <button class="float-btn btn-water" onclick="startWaterEffect()">Water </button>
    <button class="float-btn btn-music" id="musicBtn" onclick="toggleMusic()">Music </button>

    <div id="msgBox">
        <p id="typedText" style="line-height: 1.6; font-weight: 500;"></p>
        <button class="close-btn" onclick="hideMessage()">Close </button>
    </div>

    <audio id="mySong" src="song1.mp3" loop></audio>

    <script>
        // 1. Countdown Logic
        const target = new Date("April 13, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("days").innerText = Math.floor(diff / 86400000);
            document.getElementById("hours").innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById("mins").innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById("secs").innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

        // 2. Water & Flower Effect (3 seconds)
        function startWaterEffect() {
            const end = Date.now() + 3000;
            const items = ['', '', ''];
            
            const timer = setInterval(() => {
                if (Date.now() > end) return clearInterval(timer);
                
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.innerText = items[Math.floor(Math.random() * items.length)];
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.fontSize = (Math.random() * 20 + 10) + 'px';
                drop.style.duration = (Math.random() * 2 + 1) + 's';
                
                document.body.appendChild(drop);
                setTimeout(() => drop.remove(), 3000);
            }, 100);
        }

        // 3. Music Control
        const song = document.getElementById("mySong");
        const musicBtn = document.getElementById("musicBtn");
        function toggleMusic() {
            if (song.paused) {
                song.play();
                musicBtn.innerText = "Pause ";
            } else {
                song.pause();
                musicBtn.innerText = "Music ";
            }
        }

        // 4. Message Box Animation
        const fullText = "ကိုယ့်အတွက်အမြဲချိုပေးခဲ့တဲ့ ချိုရေ... ကျေးဇူးတင်ပါတယ်။ ပျော်ရွှင်ဖွယ်ကောင်းတဲ့ သင်္ကြန်က မင်းကိုစောင့်ကြိုနေပါတယ်။";
        function showMessage() {
            document.getElementById("msgBox").classList.add("show");
            document.getElementById("typedText").innerText = "";
            let i = 0;
            const typing = setInterval(() => {
                if (i < fullText.length) {
                    document.getElementById("typedText").innerText += fullText.charAt(i);
                    i++;
                } else { clearInterval(typing); }
            }, 50);
        }

        function hideMessage() {
            document.getElementById("msgBox").classList.remove("show");
        }
    </script>
</body>
</html>
